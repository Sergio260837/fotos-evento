<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Muro de Conchi - 60 Cumpleaños</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #b8860b; /* Un dorado un poco más intenso para que se lea bien sobre rosa */
            --negro: #2d3436;
            --rosa-fondo: #fce4ec; 
            --rosa-oscuro: #f8bbd0;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--rosa-fondo);
            /* Degradado sutil de rosa para que no sea plano */
            background-image: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            color: var(--negro);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            padding: 60px 20px 30px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--negro); /* Letras en negro como pediste */
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            color: var(--oro); /* Detalle en dorado */
            font-size: 1.3rem;
            margin-top: 10px;
            font-weight: 600;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        /* Efecto Polaroid */
        .foto-card {
            background: var(--blanco);
            padding: 15px 15px 45px 15px;
            border-radius: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Rotación aleatoria para que parezcan fotos tiradas sobre una mesa rosa */
        .foto-card:nth-child(3n+1) { transform: rotate(-3deg); }
        .foto-card:nth-child(3n+2) { transform: rotate(2deg); }
        .foto-card:nth-child(3n+3) { transform: rotate(-1deg); }

        .foto-card:hover {
            transform: rotate(0deg) scale(1.1);
            z-index: 10;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .foto-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border: 1px solid #fdfdfd;
        }

        .controls {
            margin: 20px 0;
            text-align: center;
        }

        .btn {
            background: var(--blanco);
            color: var(--negro);
            border: 2px solid var(--negro);
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            margin: 5px;
        }

        .btn:hover {
            background: var(--negro);
            color: var(--rosa-fondo);
        }

        #loader {
            color: var(--negro);
            font-weight: 600;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
            .foto-card img { height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Sube tus recuerdos en el<br>60 Cumpleaños de Conchi</h1>
        <div class="subtitle">Muro de Recuerdos</div>
    </header>

    <div class="container">
        <div class="controls">
            <a href="/" class="btn">📸 SUBIR MÁS FOTOS</a>
            <button class="btn" onclick="cargarFotos()">🔄 REFRESCAR MURO</button>
        </div>

        <div id="loader" style="text-align: center;">Buscando fotos bonitas...</div>
        <div class="grid" id="galeria"></div>
    </div>

    <script>
        async function cargarFotos() {
            const grid = document.getElementById('galeria');
            const loader = document.getElementById('loader');
            
            try {
                const res = await fetch('/galeria');
                const fotos = await res.json();
                
                loader.style.display = 'none';
                grid.innerHTML = ''; 

                if (fotos.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">¡El muro está vacío! Sube la primera foto para Conchi. 🎂</p>';
                    return;
                }

                fotos.forEach(url => {
                    const card = document.createElement('div');
                    card.className = 'foto-card';
                    card.innerHTML = `<img src="${url}" alt="Recuerdo">`;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                loader.innerText = "Error al conectar con la galería.";
            }
        }

        cargarFotos();
        // Se actualiza cada 30 segundos automáticamente
        setInterval(cargarFotos, 30000);
    </script>
</body>
</html>
