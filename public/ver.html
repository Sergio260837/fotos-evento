<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Muro de Conchi - 60 Cumpleaños</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #b8860b;
            --negro: #2d3436;
            --rosa-fondo: #fce4ec; 
            --rosa-oscuro: #f8bbd0;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--rosa-fondo);
            background-image: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            color: var(--negro);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        /* FOTO DE LA CUMPLEAÑERA */
        .foto-cumpleanera {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid var(--oro);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: inline-block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--negro);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .subtitle {
            color: var(--oro);
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        .controls {
            margin: 25px 0;
            text-align: center;
        }

        .btn {
            background: var(--blanco);
            color: var(--negro);
            border: 2px solid var(--negro);
            padding: 10px 22px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            margin: 5px;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: var(--negro);
            color: var(--rosa-fondo);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 35px;
            padding: 20px;
        }

        /* Estilo Polaroid */
        .foto-card {
            background: var(--blanco);
            padding: 15px 15px 45px 15px;
            border-radius: 4px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            transition: transform 0.4s ease;
        }

        .foto-card:nth-child(3n+1) { transform: rotate(-2deg); }
        .foto-card:nth-child(3n+2) { transform: rotate(3deg); }
        .foto-card:nth-child(3n+3) { transform: rotate(-1.5deg); }

        .foto-card:hover {
            transform: rotate(0deg) scale(1.08);
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .foto-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border: 1px solid #f9f9f9;
        }

        #loader {
            color: var(--negro);
            font-weight: 600;
            margin-top: 20px;
            text-align: center;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; }
            .foto-card img { height: 200px; }
            .foto-cumpleanera { width: 130px; height: 130px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://res.cloudinary.com/dy9hxg3za/image/upload/v1778623228/unnamed_k5jgyz.jpg" alt="Cumpleañera" class="foto-cumpleanera">
        
        <h1>Sube tus recuerdos en el<br>60 Cumpleaños de Conchi</h1>
        <div class="subtitle">Muro de Recuerdos</div>
    </header>

    <div class="container">
        <div class="controls">
            <a href="/" class="btn">📸 SUBIR MÁS FOTOS</a>
            <button class="btn" onclick="cargarFotos()">🔄 REFRESCAR MURO</button>
        </div>

        <div id="loader">Cargando el muro de gala...</div>
        <div class="grid" id="galeria"></div>
    </div>

    <script>
        async function cargarFotos() {
            const grid = document.getElementById('galeria');
            const loader = document.getElementById('loader');
            
            try {
                const res = await fetch('/galeria');
                const fotos = await res.json();
                
                loader.style.display = 'none';
                grid.innerHTML = ''; 

                if (fotos.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">¡El muro está esperando la primera foto para Conchi! 🎂</p>';
                    return;
                }

                fotos.forEach(url => {
                    const card = document.createElement('div');
                    card.className = 'foto-card';
                    card.innerHTML = `<img src="${url}" alt="Recuerdo">`;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                loader.innerText = "Error al conectar con la galería.";
            }
        }

        cargarFotos();
        setInterval(cargarFotos, 25000); // Actualización automática
    </script>
</body>
</html>
