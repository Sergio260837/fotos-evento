<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Muro de Conchi - 60 Cumpleaños</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #d4af37;
            --oro-brillante: #f9e29d;
            --negro: #1a1a1a;
            --rosa-fondo: #fce4ec; /* Rosa suave pastel */
            --blanco: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--rosa-fondo);
            color: var(--negro);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Cabecera en Negro y Oro para que contraste con el rosa */
        header {
            padding: 40px 20px;
            text-align: center;
            background: var(--negro);
            border-bottom: 4px solid var(--oro);
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--oro-brillante);
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--oro);
            font-size: 1.1rem;
            margin-top: 10px;
            font-weight: 300;
            letter-spacing: 3px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        /* Estilo Polaroid */
        .foto-card {
            background: var(--blanco);
            padding: 12px 12px 35px 12px;
            border-radius: 2px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .foto-card:nth-child(odd) { transform: rotate(-1.5deg); }
        .foto-card:nth-child(even) { transform: rotate(1.5deg); }

        .foto-card:hover {
            transform: rotate(0deg) scale(1.05);
            z-index: 5;
        }

        .foto-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border: 1px solid #f0f0f0;
        }

        .controls {
            margin: 20px 0;
            text-align: center;
        }

        .btn {
            background: var(--negro);
            color: var(--oro);
            border: 2px solid var(--oro);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--oro);
            color: var(--negro);
        }

        #loader {
            color: var(--negro);
            font-weight: 600;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
            .foto-card img { height: 180px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Sube tus recuerdos en el<br>60 Cumpleaños de Conchi</h1>
        <div class="subtitle">Muro de Recuerdos</div>
    </header>

    <div class="container">
        <div class="controls">
            <a href="/" class="btn">➕ Subir mi foto</a>
            <button class="btn" onclick="cargarFotos()">🔄 Actualizar</button>
        </div>

        <div id="loader" style="text-align: center;">Cargando momentos mágicos...</div>
        <div class="grid" id="galeria"></div>
    </div>

    <script>
        async function cargarFotos() {
            const grid = document.getElementById('galeria');
            const loader = document.getElementById('loader');
            
            try {
                const res = await fetch('/galeria');
                const fotos = await res.json();
                
                loader.style.display = 'none';
                grid.innerHTML = ''; 

                if (fotos.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/-1;">El muro está esperando la primera foto...</p>';
                    return;
                }

                fotos.forEach(url => {
                    const card = document.createElement('div');
                    card.className = 'foto-card';
                    card.innerHTML = `<img src="${url}" alt="Recuerdo de Conchi">`;
                    grid.appendChild(card);
                });
            } catch (e) {
                loader.innerText = "Error al conectar con la galería.";
            }
        }

        cargarFotos();
        // Se actualiza cada 30 segundos
        setInterval(cargarFotos, 30000);
    </script>
</body>
</html>
