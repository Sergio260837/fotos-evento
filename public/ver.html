<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Muro de Conchi - 60 Cumpleaños</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --oro: #d4af37;
            --oro-brillante: #f9e29d;
            --negro: #1a1a1a;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--negro);
            background-image: radial-gradient(circle at center, #2c2c2c 0%, #1a1a1a 100%);
            color: var(--blanco);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Cabecera Elegante */
        header {
            padding: 50px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            border-bottom: 2px solid var(--oro);
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--oro-brillante);
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .subtitle {
            color: var(--oro);
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: 300;
            letter-spacing: 4px;
        }

        /* Contenedor de Galería */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        /* Estilo Polaroid Premium */
        .foto-card {
            background: var(--blanco);
            padding: 12px 12px 40px 12px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .foto-card:nth-child(odd) { transform: rotate(-2deg); }
        .foto-card:nth-child(even) { transform: rotate(2deg); }

        .foto-card:hover {
            transform: rotate(0deg) scale(1.05);
            z-index: 10;
        }

        .foto-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        /* Decoración de partículas (Luces) */
        .decor {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--oro);
            border-radius: 50%;
            opacity: 0.3;
            z-index: -1;
            filter: blur(2px);
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .controls {
            margin-bottom: 30px;
            text-align: center;
        }

        .btn {
            background: transparent;
            color: var(--oro);
            border: 1px solid var(--oro);
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins';
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background: var(--oro);
            color: var(--negro);
        }

        /* Mensaje de carga */
        #loader {
            font-style: italic;
            color: var(--oro);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="decor" style="left: 10%; animation-delay: 0s;"></div>
    <div class="decor" style="left: 30%; animation-delay: 2s;"></div>
    <div class="decor" style="left: 70%; animation-delay: 5s;"></div>
    <div class="decor" style="left: 90%; animation-delay: 1s;"></div>

    <header>
        <h1>Sube tus recuerdos en el<br>60 Cumpleaños de Conchi</h1>
        <div class="subtitle">Muro de Recuerdos</div>
    </header>

    <div class="container">
        <div class="controls">
            <a href="/" class="btn">⬅️ Subir más fotos</a>
            <button class="btn" onclick="cargarFotos()">🔄 Actualizar Muro</button>
        </div>

        <div id="loader" style="text-align: center;">Buscando momentos mágicos...</div>
        <div class="grid" id="galeria"></div>
    </div>

    <script>
        async function cargarFotos() {
            const grid = document.getElementById('galeria');
            const loader = document.getElementById('loader');
            
            try {
                const res = await fetch('/galeria');
                const fotos = await res.json();
                
                loader.style.display = 'none';
                grid.innerHTML = ''; 

                if (fotos.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/-1;">Aún no hay fotos en el muro. ¡Estrena el álbum!</p>';
                    return;
                }

                fotos.forEach(url => {
                    const card = document.createElement('div');
                    card.className = 'foto-card';
                    card.innerHTML = `<img src="${url}" alt="Recuerdo">`;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error(e);
                loader.innerText = "Error al conectar con el muro.";
            }
        }

        // Cargar al iniciar
        cargarFotos();

        // Actualizar automáticamente cada 20 segundos para que sea "en vivo"
        setInterval(cargarFotos, 20000);
    </script>
</body>
</html>
