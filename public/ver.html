<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Muro de Conchi - 60 Cumpleaños</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --oro: #b8860b;
            --negro: #2d3436;
            --rosa-fondo: #fce4ec; 
            --blanco: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--rosa-fondo);
            background-image: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            background-attachment: fixed;
            color: var(--negro);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            padding: 50px 20px;
            text-align: center;
        }

        .foto-cumpleanera {
            width: 170px; height: 170px;
            object-fit: cover;
            border-radius: 50%;
            border: 6px solid var(--oro);
            box-shadow: 0 10px 30px rgba(184, 134, 11, 0.3);
            margin-bottom: 25px;
            cursor: pointer;
            transition: transform 0.4s ease;
        }

        .foto-cumpleanera:hover { transform: scale(1.1); }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'Special Elite', cursive;
            color: var(--oro);
            font-size: 1.6rem;
            margin-top: 15px;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        .controls { margin-bottom: 40px; text-align: center; }

        .btn-main {
            background: var(--negro);
            color: var(--rosa-fondo);
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            transition: 0.3s;
        }

        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            padding: 20px;
        }

        .foto-card {
            background: var(--blanco);
            padding: 15px;
            border-radius: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .foto-card:nth-child(even) { transform: rotate(2deg); }
        .foto-card:nth-child(odd) { transform: rotate(-2deg); }

        .foto-card:hover { transform: rotate(0deg) scale(1.05); z-index: 10; }

        .foto-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .btn-download {
            background: var(--oro);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
            transition: 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .btn-download:hover { background: var(--negro); }

        #loader { text-align: center; margin: 50px; font-family: 'Special Elite'; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://res.cloudinary.com/dy9hxg3za/image/upload/v1778623228/unnamed_k5jgyz.jpg" 
             alt="Conchi" class="foto-cumpleanera" onclick="lanzarConfeti()">
        <h1>60 Cumpleaños de Conchi</h1>
        <div class="subtitle">Muro de Recuerdos Mágicos</div>
    </header>

    <div class="container">
        <div class="controls">
            <a href="/" class="btn-main">✨ SUBIR MI MOMENTO</a>
            <button class="btn-main" onclick="actualizarMuro()">🔄 ACTUALIZAR</button>
        </div>

        <div id="loader">Cargando la magia...</div>
        <div class="grid" id="galeria"></div>
    </div>

    <script>
        function lanzarConfeti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#b8860b', '#f8bbd0', '#ffffff']
            });
        }

        async function descargarFoto(url, index) {
            const res = await fetch(url);
            const blob = await res.blob();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `recuerdo-conchi-${index}.jpg`;
            link.click();
        }

        async function cargarFotos() {
            const grid = document.getElementById('galeria');
            const loader = document.getElementById('loader');
            try {
                const res = await fetch('/galeria');
                const fotos = await res.json();
                loader.style.display = 'none';
                grid.innerHTML = ''; 
                
                fotos.forEach((url, index) => {
                    const card = document.createElement('div');
                    card.className = 'foto-card';
                    card.innerHTML = `
                        <img src="${url}" alt="Recuerdo">
                        <button class="btn-download" onclick="descargarFoto('${url}', ${index})">
                            📥 Descargar Foto
                        </button>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                loader.innerText = "Error al cargar los recuerdos.";
            }
        }

        function actualizarMuro() {
            lanzarConfeti();
            cargarFotos();
        }

        window.onload = () => {
            cargarFotos();
            setTimeout(lanzarConfeti, 1000);
        };
        
        setInterval(cargarFotos, 30000);
    </script>
</body>
</html>
