<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎈 ¡Feliz Cumpleaños! - Sube tus fotos</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #ff7f50;
            --bg: #f7f1e3;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Decoración de fondo */
        body::before, body::after {
            content: "🎈";
            position: fixed;
            font-size: 50px;
            z-index: -1;
            animation: float 6s infinite ease-in-out;
        }
        body::before { left: 10%; top: 20%; }
        body::after { right: 10%; bottom: 20%; animation-delay: 3s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 71, 87, 0.2);
            text-align: center;
            width: 90%;
            max-width: 450px;
            position: relative;
            border: 4px solid #ffda79;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p { color: #57606f; line-height: 1.6; }

        .upload-area {
            border: 3px dashed #ffda79;
            padding: 30px;
            border-radius: 20px;
            margin: 25px 0;
            background: #fffdf7;
            transition: 0.3s;
        }

        .upload-area:hover { border-color: var(--secondary); }

        input[type="file"] { display: none; }

        .label-file {
            background: var(--secondary);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            display: inline-block;
            transition: 0.3s;
        }

        .label-file:hover { transform: scale(1.05); background: var(--primary); }

        #btn-subir {
            background: #2ed573;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.3);
            transition: 0.3s;
        }

        #btn-subir:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(46, 213, 115, 0.4); }
        #btn-subir:disabled { background: #ccc; cursor: not-allowed; }

        #status {
            margin-top: 20px;
            font-weight: 600;
            color: #2f3542;
        }

        .file-count { font-size: 0.9rem; color: #747d8c; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>¡Feliz Cumple!</h1>
        <p>Ayúdanos a guardar los mejores recuerdos de hoy. ¡Sube tus fotos aquí!</p>
        
        <div class="upload-area">
            <label for="fotos" class="label-file">📸 Seleccionar Fotos</label>
            <input type="file" id="fotos" multiple accept="image/*" onchange="actualizarContador()">
            <div id="contador" class="file-count">Ninguna foto seleccionada</div>
        </div>

        <button id="btn-subir" onclick="subir()">¡Enviar al álbum!</button>
        <p id="status"></p>
    </div>

    <script>
        function actualizarContador() {
            const input = document.getElementById('fotos');
            const contador = document.getElementById('contador');
            const num = input.files.length;
            contador.innerText = num === 1 ? "1 foto lista" : num + " fotos listas";
        }

        async function subir() {
            const btn = document.getElementById('btn-subir');
            const status = document.getElementById('status');
            const input = document.getElementById('fotos');
            
            if (input.files.length === 0) return alert("¡Elige alguna foto primero! 🎂");

            const formData = new FormData();
            for (let file of input.files) { formData.append('fotos', file); }

            btn.disabled = true;
            status.innerHTML = "Subiendo tus recuerdos... 🥳";

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                if (response.ok) {
                    status.innerHTML = "✅ ¡Subidas con éxito!<br>Sigue disfrutando de la fiesta.";
                    input.value = "";
                    document.getElementById('contador').innerText = "¡Enviadas!";
                }
            } catch (e) {
                status.innerText = "❌ Ups, algo falló. Inténtalo de nuevo.";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
